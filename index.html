<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي خوارزميات المصفوفات</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h2>تصوير حي لخوارزميات المصفوفات</h2><br>
        <button onclick="initArray()">توليد مصفوفة جديدة</button>
        <button id="speed" onclick="editSpeed()">speed (×1)</button>
        <div class="controls">
            <button id="btn1" onclick="runBubbleSort()">bubble sort</button>
            <button id="btn2" onclick="runInsertionSort()">insertion sort</button>
            <button id="btn3" onclick="runSelectionSort()">selection sort</button>
            <button id="btn4" onclick="runMergeSort()">merge sort</button>
            <button id="btn5" onclick="runQuickSort()">quick sort</button>
        </div>
    </div>

    <div class="visualizer-wrapper">
        <div id="array-container"></div>
        <div id="about-container">
               <h4 id="about-header"></h4>
               <p id="about-body"></p>
               <button id="Reset" onclick="Reset()">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
